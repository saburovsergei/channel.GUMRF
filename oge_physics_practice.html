<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Физика ОГЭ | Практика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #764ba2;
        }
        
        .nav-right {
            display: flex;
            justify-content: center;
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            padding: 6px 16px;
            border-radius: 50px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        .page-title span {
            background: #27ae60;
            color: white;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.8em;
        }
        
        .content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 20px 15px;
            margin-top: 2px;
        }
        
        .examples-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 100%;
            margin: 0 auto;
        }
        
        .example-item {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e0e0e0;
        }
        
        .example-header {
            padding: 12px 15px;
            background: white;
        }
        
        .example-name {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .example-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 12px 5px;
            background: white;
            border: 2px solid #3498db;
            border-radius: 50px;
            color: #3498db;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em;
            width: 100%;
        }
        
        .action-btn.solution {
            border-color: #27ae60;
            color: #27ae60;
        }
        
        .action-btn:active {
            transform: scale(0.98);
        }
        
        .action-btn.active {
            background: #3498db;
            color: white;
        }
        
        .action-btn.solution.active {
            background: #27ae60;
            color: white;
        }
        
        .btn-icon {
            font-size: 1.1em;
        }
        
        .pdf-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            background: #f8f9fa;
        }
        
        .pdf-container.open {
            max-height: 70vh;
            border-top: 2px solid #e0e0e0;
        }
        
        .pdf-viewer {
            width: 100%;
            height: 70vh;
            border: none;
            display: block;
        }
        
        /* Для очень маленьких экранов */
        @media (max-width: 380px) {
            .action-btn {
                font-size: 0.85em;
                padding: 10px 3px;
            }
            
            .btn-icon {
                font-size: 1em;
            }
            
            .example-name {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-left">
                <a href="oge_physics.html" class="back-btn">← Назад</a>
            </div>
            <div class="nav-right">
                <div class="page-title">
                    Физика 🔬 <span>практика</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="examples-list">
                <!-- Пример A -->
                <div class="example-item">
                    <div class="example-header">
                        <div class="example-name">Пример A</div>
                        <div class="example-buttons">
                            <button class="action-btn" onclick="togglePDF('exampleA', this, 'pdf-exampleA', 'viewer-exampleA')">
                                <span class="btn-icon">📋</span> Задание
                            </button>
                            <button class="action-btn solution" onclick="togglePDF('solutionA', this, 'pdf-solutionA', 'viewer-solutionA')">
                                <span class="btn-icon">✅</span> Решение
                            </button>
                        </div>
                    </div>
                    <div class="pdf-container" id="pdf-exampleA">
                        <iframe class="pdf-viewer" id="viewer-exampleA" src=""></iframe>
                    </div>
                    <div class="pdf-container" id="pdf-solutionA">
                        <iframe class="pdf-viewer" id="viewer-solutionA" src=""></iframe>
                    </div>
                </div>
                
                <!-- Пример B -->
                <div class="example-item">
                    <div class="example-header">
                        <div class="example-name">Пример B</div>
                        <div class="example-buttons">
                            <button class="action-btn" onclick="togglePDF('exampleB', this, 'pdf-exampleB', 'viewer-exampleB')">
                                <span class="btn-icon">📋</span> Задание
                            </button>
                            <button class="action-btn solution" onclick="togglePDF('solutionB', this, 'pdf-solutionB', 'viewer-solutionB')">
                                <span class="btn-icon">✅</span> Решение
                            </button>
                        </div>
                    </div>
                    <div class="pdf-container" id="pdf-exampleB">
                        <iframe class="pdf-viewer" id="viewer-exampleB" src=""></iframe>
                    </div>
                    <div class="pdf-container" id="pdf-solutionB">
                        <iframe class="pdf-viewer" id="viewer-solutionB" src=""></iframe>
                    </div>
                </div>
                
                <!-- Пример C -->
                <div class="example-item">
                    <div class="example-header">
                        <div class="example-name">Пример C</div>
                        <div class="example-buttons">
                            <button class="action-btn" onclick="togglePDF('exampleC', this, 'pdf-exampleC', 'viewer-exampleC')">
                                <span class="btn-icon">📋</span> Задание
                            </button>
                            <button class="action-btn solution" onclick="togglePDF('solutionC', this, 'pdf-solutionC', 'viewer-solutionC')">
                                <span class="btn-icon">✅</span> Решение
                            </button>
                        </div>
                    </div>
                    <div class="pdf-container" id="pdf-exampleC">
                        <iframe class="pdf-viewer" id="viewer-exampleC" src=""></iframe>
                    </div>
                    <div class="pdf-container" id="pdf-solutionC">
                        <iframe class="pdf-viewer" id="viewer-solutionC" src=""></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ВАШИ ID ФАЙЛОВ
        const files = {
            exampleA: { id: '1p91Yi0Dh8_19QIuwfs6niz9qV1Vs7gNs', name: 'Задание A' },
            exampleB: { id: '19QOCPFsZgNtxRxESmtKgsi3gOKmPWNUv', name: 'Задание B' },
            exampleC: { id: '18a_sA3qhksjKvZ1BlItlqdQjnAHF3K5J', name: 'Задание C' },
            solutionA: { id: '1nLP1v3VCzaWj3NEEhhVY3MyzIcsevnoO', name: 'Решение A' },
            solutionB: { id: '1LZpvWKo4CeZpdy4S_zUjeP8JHAzc6FmD', name: 'Решение B' },
            solutionC: { id: '14enFT_KXbB0olde8tMkWubr-aH9pvQln', name: 'Решение C' }
        };
        
        let currentOpenContainer = null;
        let currentActiveButton = null;
        
        function togglePDF(fileKey, button, containerId, viewerId) {
            const fileId = files[fileKey].id;
            const container = document.getElementById(containerId);
            const viewer = document.getElementById(viewerId);
            
            if (!fileId) {
                alert(`Файл не найден`);
                return;
            }
            
            // Если нажали на ту же кнопку
            if (currentActiveButton === button) {
                if (currentOpenContainer) {
                    currentOpenContainer.classList.remove('open');
                }
                button.classList.remove('active');
                currentActiveButton = null;
                currentOpenContainer = null;
                return;
            }
            
            // Закрываем предыдущий открытый контейнер
            if (currentOpenContainer) {
                currentOpenContainer.classList.remove('open');
            }
            
            // Убираем активный класс с предыдущей кнопки
            if (currentActiveButton) {
                currentActiveButton.classList.remove('active');
            }
            
            // Загружаем и открываем новый
            viewer.src = `https://drive.google.com/file/d/${fileId}/preview`;
            container.classList.add('open');
            button.classList.add('active');
            
            currentOpenContainer = container;
            currentActiveButton = button;
            
            // Плавно прокручиваем к открытому контейнеру
            setTimeout(() => {
                container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }
    </script>
</body>
</html>
