<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физика ОГЭ | Практика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #764ba2;
            transform: translateX(-5px);
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            padding: 8px 20px;
            border-radius: 50px;
            color: #333;
            font-weight: 600;
        }
        
        .page-title span {
            background: #27ae60;
            color: white;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.8em;
        }
        
        .content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            margin-top: 2px;
        }
        
        .examples-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .example-item {
            background: #f8f9fa;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        
        .example-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 25px;
            background: white;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .example-header:hover {
            background: #f0f7f0;
        }
        
        .example-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            min-width: 120px;
        }
        
        .example-buttons {
            display: flex;
            gap: 15px;
        }
        
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 25px;
            background: white;
            border: 2px solid #3498db;
            border-radius: 50px;
            color: #3498db;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }
        
        .action-btn.solution {
            border-color: #27ae60;
            color: #27ae60;
        }
        
        .action-btn:hover {
            background: #3498db;
            color: white;
            transform: translateY(-2px);
        }
        
        .action-btn.solution:hover {
            background: #27ae60;
            color: white;
        }
        
        .action-btn.active {
            background: #3498db;
            color: white;
        }
        
        .action-btn.solution.active {
            background: #27ae60;
            color: white;
        }
        
        .pdf-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            background: #f8f9fa;
        }
        
        .pdf-container.open {
            max-height: 800px;
            border-top: 2px solid #e0e0e0;
        }
        
        .pdf-viewer {
            width: 100%;
            height: 700px;
            border: none;
            display: block;
        }
        
        .btn-icon {
            font-size: 1.2em;
        }
        
        @media (max-width: 768px) {
            .example-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
            
            .example-buttons {
                width: 100%;
                justify-content: space-between;
            }
            
            .action-btn {
                flex: 1;
                justify-content: center;
                padding: 10px 15px;
            }
            
            .pdf-viewer {
                height: 500px;
            }
            
            .pdf-container.open {
                max-height: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-left">
                <a href="oge_physics.html" class="back-btn">← Назад к разделам</a>
            </div>
            <div class="nav-right">
                <div class="page-title">
                    Физика 🔬 <span>практика</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="examples-list">
                <!-- Пример A -->
                <div class="example-item">
                    <div class="example-header">
                        <div class="example-name">Пример A</div>
                        <div class="example-buttons">
                            <button class="action-btn" onclick="togglePDF('exampleA', this)">
                                <span class="btn-icon">📋</span> Задание
                            </button>
                            <button class="action-btn solution" onclick="togglePDF('solutionA', this)">
                                <span class="btn-icon">✅</span> Решение
                            </button>
                        </div>
                    </div>
                    <div class="pdf-container" id="pdf-exampleA">
                        <iframe class="pdf-viewer" id="viewer-exampleA" src=""></iframe>
                    </div>
                </div>
                
                <!-- Пример B -->
                <div class="example-item">
                    <div class="example-header">
                        <div class="example-name">Пример B</div>
                        <div class="example-buttons">
                            <button class="action-btn" onclick="togglePDF('exampleB', this)">
                                <span class="btn-icon">📋</span> Задание
                            </button>
                            <button class="action-btn solution" onclick="togglePDF('solutionB', this)">
                                <span class="btn-icon">✅</span> Решение
                            </button>
                        </div>
                    </div>
                    <div class="pdf-container" id="pdf-exampleB">
                        <iframe class="pdf-viewer" id="viewer-exampleB" src=""></iframe>
                    </div>
                </div>
                
                <!-- Пример C -->
                <div class="example-item">
                    <div class="example-header">
                        <div class="example-name">Пример C</div>
                        <div class="example-buttons">
                            <button class="action-btn" onclick="togglePDF('exampleC', this)">
                                <span class="btn-icon">📋</span> Задание
                            </button>
                            <button class="action-btn solution" onclick="togglePDF('solutionC', this)">
                                <span class="btn-icon">✅</span> Решение
                            </button>
                        </div>
                    </div>
                    <div class="pdf-container" id="pdf-exampleC">
                        <iframe class="pdf-viewer" id="viewer-exampleC" src=""></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // !!! ЗДЕСЬ ВСТАВЬТЕ ID ВАШИХ ФАЙЛОВ С GOOGLE DRIVE !!!
        const files = {
            // Задания (примеры)
            exampleA: { id: 'ID_ЗАДАНИЯ_A', name: 'Задание A' },
            exampleB: { id: 'ID_ЗАДАНИЯ_B', name: 'Задание B' },
            exampleC: { id: 'ID_ЗАДАНИЯ_C', name: 'Задание C' },
            
            // Решения
            solutionA: { id: 'ID_РЕШЕНИЯ_A', name: 'Решение A' },
            solutionB: { id: 'ID_РЕШЕНИЯ_B', name: 'Решение B' },
            solutionC: { id: 'ID_РЕШЕНИЯ_C', name: 'Решение C' }
        };
        
        let currentOpenItem = null;
        let currentActiveButton = null;
        
        function togglePDF(fileKey, button) {
            const fileId = files[fileKey].id;
            const exampleId = fileKey.slice(0, -1); // exampleA -> example, solutionA -> solution
            const container = document.getElementById(`pdf-${fileKey}`);
            const viewer = document.getElementById(`viewer-${fileKey}`);
            
            // Проверяем доступность файла
            if (!fileId || fileId.startsWith('ID_')) {
                alert(`Файл "${files[fileKey].name}" еще не добавлен. Пожалуйста, вставьте ID файла в код.`);
                return;
            }
            
            // Если кликнули на ту же кнопку, что уже активна
            if (currentActiveButton === button) {
                // Закрываем просмотрщик
                container.classList.remove('open');
                button.classList.remove('active');
                currentActiveButton = null;
                currentOpenItem = null;
                return;
            }
            
            // Если есть другой открытый элемент, закрываем его
            if (currentOpenItem && currentOpenItem !== fileKey) {
                const oldContainer = document.getElementById(`pdf-${currentOpenItem}`);
                if (oldContainer) {
                    oldContainer.classList.remove('open');
                }
                if (currentActiveButton) {
                    currentActiveButton.classList.remove('active');
                }
            }
            
            // Загружаем PDF и открываем
            viewer.src = `https://drive.google.com/file/d/${fileId}/preview`;
            container.classList.add('open');
            
            // Убираем активный класс с предыдущей кнопки и ставим на новую
            if (currentActiveButton) {
                currentActiveButton.classList.remove('active');
            }
            button.classList.add('active');
            
            currentOpenItem = fileKey;
            currentActiveButton = button;
        }
    </script>
</body>
</html>
