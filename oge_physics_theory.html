<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Физика ОГЭ | Теория</title>
    <style>
        /* Стили остаются без изменений */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #764ba2;
        }
        
        .nav-right {
            display: flex;
            justify-content: center;
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            padding: 6px 16px;
            border-radius: 50px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        .page-title span {
            background: #e74c3c;
            color: white;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.8em;
        }
        
        .content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 20px 15px;
            margin-top: 2px;
        }
        
        .theory-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 100%;
            margin: 0 auto;
        }
        
        .theory-item {
            background: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }
        
        .theory-header {
            padding: 12px 15px;
            background: white;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .theory-header:hover {
            background: #fef5f5;
        }
        
        .theory-icon {
            font-size: 1.5em;
            min-width: 35px;
            text-align: center;
            color: #e74c3c;
        }
        
        .theory-name {
            flex: 1;
            font-size: 1.1em;
            font-weight: 500;
            color: #333;
        }
        
        .expand-icon {
            font-size: 1.2em;
            color: #e74c3c;
            transition: transform 0.3s ease;
        }
        
        .theory-header.active .expand-icon {
            transform: rotate(180deg);
        }
        
        .pdf-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            background: #f8f9fa;
        }
        
        .pdf-container.open {
            max-height: 70vh;
            border-top: 1px solid #e0e0e0;
        }
        
        .pdf-viewer {
            width: 100%;
            height: 70vh;
            border: none;
            display: block;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 1.1em;
        }
        
        .error {
            text-align: center;
            padding: 30px;
            color: #e74c3c;
            font-size: 1.1em;
        }
        
        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        
        @media (max-width: 380px) {
            .theory-name {
                font-size: 1em;
            }
            
            .theory-icon {
                font-size: 1.3em;
                min-width: 30px;
            }
            
            .theory-header {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-left">
                <a href="oge_physics.html" class="back-btn">← Назад</a>
            </div>
            <div class="nav-right">
                <div class="page-title">
                    Физика 📖 <span>теория</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <button class="refresh-btn" onclick="forceReloadThemes()">🔄 Обновить темы</button>
            <div id="theory-list-container" class="theory-list">
                <div class="loading">Загрузка тем...</div>
            </div>
        </div>
    </div>

    <script>
        let currentOpenContainer = null;
        let currentActiveHeader = null;
        let currentCacheBuster = Date.now(); // Уникальное число для обновления кеша
        
        // Загрузка данных из текстового файла с отключением кеша
        async function loadThemes() {
            try {
                // Добавляем параметр timestamp, чтобы браузер не кешировал файл
                const url = `oge_physics_theory_themes.txt?t=${currentCacheBuster}`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Не удалось загрузить файл с темами');
                }
                
                const text = await response.text();
                console.log('Загруженные данные:', text); // Отладка
                
                const lines = text.trim().split('\n');
                
                const theoryFiles = {};
                const container = document.getElementById('theory-list-container');
                container.innerHTML = ''; // Очищаем контейнер
                
                let hasValidLines = false;
                
                lines.forEach((line, index) => {
                    // Пропускаем пустые строки
                    if (!line.trim()) return;
                    
                    const [name, id] = line.split('|');
                    if (name && id) {
                        hasValidLines = true;
                        const topicKey = `topic${index + 1}`;
                        theoryFiles[topicKey] = { 
                            id: id.trim(), 
                            name: name.trim() 
                        };
                        
                        // Создаем элемент темы
                        const topicElement = createTopicElement(topicKey, name.trim());
                        container.appendChild(topicElement);
                        
                        console.log(`Добавлена тема: ${name.trim()} с ID: ${id.trim()}`);
                    }
                });
                
                // Сохраняем theoryFiles в глобальную область видимости
                window.theoryFiles = theoryFiles;
                
                // Если нет тем, показываем сообщение
                if (!hasValidLines) {
                    container.innerHTML = '<div class="error">Файл с темами пуст или имеет неверный формат</div>';
                }
                
            } catch (error) {
                console.error('Ошибка загрузки тем:', error);
                const container = document.getElementById('theory-list-container');
                container.innerHTML = `<div class="error">Ошибка загрузки тем. Пожалуйста, проверьте файл oge_physics_theory_themes.txt<br>${error.message}</div>`;
            }
        }
        
        // Принудительная перезагрузка тем
        function forceReloadThemes() {
            currentCacheBuster = Date.now(); // Новый timestamp
            loadThemes(); // Перезагружаем
        }
        
        // Создание HTML элемента для темы
        function createTopicElement(topicKey, topicName) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'theory-item';
            
            const headerDiv = document.createElement('div');
            headerDiv.className = 'theory-header';
            headerDiv.setAttribute('onclick', `toggleTheory('${topicKey}', this)`);
            
            headerDiv.innerHTML = `
                <div class="theory-icon">📘</div>
                <div class="theory-name">${topicName}</div>
                <div class="expand-icon">▼</div>
            `;
            
            const pdfContainer = document.createElement('div');
            pdfContainer.className = 'pdf-container';
            pdfContainer.id = `pdf-${topicKey}`;
            
            const pdfViewer = document.createElement('iframe');
            pdfViewer.className = 'pdf-viewer';
            pdfViewer.id = `viewer-${topicKey}`;
            pdfViewer.src = '';
            
            pdfContainer.appendChild(pdfViewer);
            itemDiv.appendChild(headerDiv);
            itemDiv.appendChild(pdfContainer);
            
            return itemDiv;
        }
        
        // Функция открытия/закрытия темы
        function toggleTheory(topicKey, header) {
            const fileData = window.theoryFiles[topicKey];
            
            if (!fileData) {
                alert(`Данные для темы не найдены`);
                return;
            }
            
            if (!fileData.id || fileData.id.startsWith('ID_')) {
                alert(`Файл для "${fileData.name}" еще не добавлен. Пожалуйста, укажите ID в файле oge_physics_theory_themes.txt`);
                return;
            }
            
            const container = document.getElementById(`pdf-${topicKey}`);
            const viewer = document.getElementById(`viewer-${topicKey}`);
            
            // Если кликнули на ту же тему
            if (currentActiveHeader === header) {
                container.classList.remove('open');
                header.classList.remove('active');
                currentActiveHeader = null;
                currentOpenContainer = null;
                return;
            }
            
            // Закрываем предыдущую открытую тему
            if (currentOpenContainer) {
                currentOpenContainer.classList.remove('open');
            }
            if (currentActiveHeader) {
                currentActiveHeader.classList.remove('active');
            }
            
            // Загружаем PDF и открываем новую тему
            viewer.src = `https://drive.google.com/file/d/${fileData.id}/preview`;
            container.classList.add('open');
            header.classList.add('active');
            
            currentOpenContainer = container;
            currentActiveHeader = header;
            
            // Прокручиваем к открытому материалу
            setTimeout(() => {
                container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }
        
        // Загружаем темы при загрузке страницы
        document.addEventListener('DOMContentLoaded', loadThemes);
        
        // Дополнительно: принудительно загружаем при каждом показе страницы
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                // Страница загружена из кеша (back/forward)
                forceReloadThemes();
            }
        });
    </script>
</body>
</html>
