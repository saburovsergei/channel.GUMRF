<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математика ОГЭ | Теория</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #764ba2;
            transform: translateX(-5px);
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            padding: 8px 20px;
            border-radius: 50px;
            color: #333;
            font-weight: 600;
        }
        
        .page-title span {
            background: #3498db;
            color: white;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.8em;
        }
        
        .content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            margin-top: 2px;
        }
        
        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid #3498db;
        }
        
        .pdf-container {
            width: 100%;
            height: 800px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .theory-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .theory-btn {
            padding: 15px 30px;
            background: white;
            border: 2px solid #3498db;
            border-radius: 50px;
            color: #3498db;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .theory-btn:hover {
            background: #3498db;
            color: white;
            transform: translateY(-2px);
        }
        
        .theory-btn.active {
            background: #3498db;
            color: white;
        }
        
        @media (max-width: 768px) {
            .pdf-container {
                height: 500px;
            }
            
            .theory-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .theory-btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-left">
                <a href="oge_math.html" class="back-btn">← Назад к разделам</a>
            </div>
            <div class="nav-right">
                <div class="page-title">
                    Математика 📖 <span>теория</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="section-title">📚 Теоретические материалы по математике</div>
            
            <div class="pdf-container">
                <iframe class="pdf-viewer" id="pdfViewer" src=""></iframe>
            </div>
            
            <div class="theory-buttons">
                <button class="theory-btn active" onclick="loadPDF('algebra')">Алгебра</button>
                <button class="theory-btn" onclick="loadPDF('geometry')">Геометрия</button>
                <button class="theory-btn" onclick="loadPDF('functions')">Функции</button>
                <button class="theory-btn" onclick="loadPDF('probability')">Теория вероятностей</button>
            </div>
        </div>
    </div>

    <script>
        // !!! ЗДЕСЬ ВСТАВЬТЕ ID ВАШИХ PDF ФАЙЛОВ С ТЕОРИЕЙ !!!
        const theoryFiles = {
            algebra: { 
                id: 'ID_ФАЙЛА_АЛГЕБРА', 
                name: 'Алгебра',
                description: 'Формулы сокращенного умножения, уравнения, неравенства'
            },
            geometry: { 
                id: 'ID_ФАЙЛА_ГЕОМЕТРИЯ', 
                name: 'Геометрия',
                description: 'Треугольники, окружности, площади фигур'
            },
            functions: { 
                id: 'ID_ФАЙЛА_ФУНКЦИИ', 
                name: 'Функции',
                description: 'Линейные, квадратичные функции, графики'
            },
            probability: { 
                id: 'ID_ФАЙЛА_ВЕРОЯТНОСТЬ', 
                name: 'Теория вероятностей',
                description: 'Комбинаторика, вероятность событий'
            }
        };
        
        function loadPDF(topic) {
            const fileId = theoryFiles[topic].id;
            const viewer = document.getElementById('pdfViewer');
            
            // Проверяем, что ID не пустой и не шаблонный
            if (fileId && fileId !== 'ID_ФАЙЛА_АЛГЕБРА' && !fileId.startsWith('ID_')) {
                viewer.src = `https://drive.google.com/file/d/${fileId}/preview`;
            } else {
                alert(`Файл "${theoryFiles[topic].name}" еще не добавлен. Пожалуйста, вставьте ID файла в код.`);
                return;
            }
            
            // Подсвечиваем активную кнопку
            document.querySelectorAll('.theory-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        // Загружаем первую тему при открытии страницы
        window.onload = function() {
            // Проверяем, есть ли реальный ID для алгебры
            if (theoryFiles.algebra.id !== 'ID_ФАЙЛА_АЛГЕБРА') {
                loadPDF('algebra');
            }
        };
    </script>
</body>
</html>
