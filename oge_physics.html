<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физика ОГЭ | Материалы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #764ba2;
            transform: translateX(-5px);
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            padding: 8px 20px;
            border-radius: 50px;
            color: #333;
            font-weight: 600;
        }
        
        .page-title span {
            background: #e74c3c;
            color: white;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.8em;
        }
        
        .content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            margin-top: 2px;
        }
        
        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid #e74c3c;
        }
        
        .pdf-container {
            width: 100%;
            height: 800px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Максимально простые кнопки для примеров */
        .examples {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .example-btn {
            padding: 15px 40px;
            background: white;
            border: 2px solid #e74c3c;
            border-radius: 50px;
            color: #e74c3c;
            font-size: 1.3em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
            text-align: center;
        }
        
        .example-btn:hover {
            background: #e74c3c;
            color: white;
            transform: translateY(-2px);
        }
        
        .example-btn.active {
            background: #e74c3c;
            color: white;
        }
        
        @media (max-width: 768px) {
            .pdf-container {
                height: 500px;
            }
            
            .examples {
                flex-direction: column;
                align-items: center;
            }
            
            .example-btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-left">
                <a href="oge.html" class="back-btn">← Назад к ОГЭ</a>
            </div>
            <div class="nav-right">
                <div class="page-title">
                    Физика ⚡ <span>ОГЭ</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="section-title">📚 Физика - тренировочные работы</div>
            
            <!-- Контейнер для предпросмотра PDF -->
            <div class="pdf-container">
                <iframe class="pdf-viewer" id="pdfViewer" src=""></iframe>
            </div>
            
            <!-- Максимально простые кнопки: Пример A, Пример B, Пример C -->
            <div class="examples">
                <button class="example-btn active" onclick="loadFile('file1')" id="btn1">Пример A</button>
                <button class="example-btn" onclick="loadFile('file2')" id="btn2">Пример B</button>
                <button class="example-btn" onclick="loadFile('file3')" id="btn3">Пример C</button>
            </div>
        </div>
    </div>

    <script>
        // ID ваших файлов с Google Drive
        const files = {
            file1: {
                id: '19QOCPFsZgNtxRxESmtKgsi3gOKmPWNUv',  // Пример A
                name: 'Пример A'
            },
            file2: {
                id: '1p91Yi0Dh8_19QIuwfs6niz9qV1Vs7gNs',  // Пример B
                name: 'Пример B'
            },
            file3: {
                id: '18a_sA3qhksjKvZ1BlItlqdQjnAHF3K5J',  // Пример C
                name: 'Пример C'
            }
        };
        
        let currentFile = 'file1';
        
        function loadFile(fileKey) {
            currentFile = fileKey;
            const fileId = files[fileKey].id;
            const viewer = document.getElementById('pdfViewer');
            
            // Ссылка для встраивания
            viewer.src = `https://drive.google.com/file/d/${fileId}/preview`;
            
            // Подсвечиваем активную кнопку
            document.querySelectorAll('.example-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`btn${fileKey.slice(-1)}`).classList.add('active');
        }
        
        // Загружаем первый пример при открытии страницы
        window.onload = function() {
            loadFile('file1');
        };
    </script>
</body>
</html>
