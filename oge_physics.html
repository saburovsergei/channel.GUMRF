<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физика ОГЭ | Материалы</title>
    <style>
        /* --- СТИЛИ (аналогично странице математики) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #764ba2;
            transform: translateX(-5px);
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            padding: 8px 20px;
            border-radius: 50px;
            color: #333;
            font-weight: 600;
        }
        
        .page-title span {
            background: #e74c3c;
            color: white;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.8em;
        }
        
        .content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            margin-top: 2px;
        }
        
        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid #e74c3c;
        }
        
        .pdf-container {
            width: 100%;
            height: 800px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .files-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .file-card {
            padding: 25px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            transition: all 0.3s ease;
            text-align: center;
            cursor: pointer;
            background: white;
        }
        
        .file-card:hover {
            border-color: #e74c3c;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.15);
        }
        
        .file-card.active {
            border-color: #e74c3c;
            background: #fff5f5;
        }
        
        .file-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .file-card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.3em;
        }
        
        .file-card p {
            color: #666;
            font-size: 0.9em;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        
        .action-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #4285f4;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }
        
        .action-btn:hover {
            background: #3367d6;
            transform: translateY(-2px);
        }
        
        .action-btn.download {
            background: #27ae60;
        }
        
        .action-btn.download:hover {
            background: #219a52;
        }
        
        @media (max-width: 768px) {
            .files-grid {
                grid-template-columns: 1fr;
            }
            
            .pdf-container {
                height: 500px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-left">
                <a href="oge.html" class="back-btn">← Назад к ОГЭ</a>
            </div>
            <div class="nav-right">
                <div class="page-title">
                    Физика ⚡ <span>ОГЭ</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="section-title">📚 Физика - тренировочные работы</div>
            
            <!-- Контейнер для предпросмотра PDF -->
            <div class="pdf-container">
                <iframe class="pdf-viewer" id="pdfViewer" src=""></iframe>
            </div>
            
            <!-- Карточки для выбора файлов -->
            <div class="files-grid">
                <!-- Карточка 1: Работа №1 -->
                <div class="file-card active" onclick="loadFile('file1')" id="card1">
                    <div class="file-icon">⚡</div>
                    <h3>Работа № 1</h3>
                    <p>Тренировочная работа по физике</p>
                </div>
                
                <!-- Карточка 2: Работа №2 -->
                <div class="file-card" onclick="loadFile('file2')" id="card2">
                    <div class="file-icon">🔋</div>
                    <h3>Работа № 2</h3>
                    <p>Тренировочная работа по физике</p>
                </div>
                
                <!-- Карточка 3: Работа №3 -->
                <div class="file-card" onclick="loadFile('file3')" id="card3">
                    <div class="file-icon">💡</div>
                    <h3>Работа № 3</h3>
                    <p>Тренировочная работа по физике</p>
                </div>
            </div>
            
            <!-- Кнопки действий -->
            <div class="action-buttons">
                <button class="action-btn" onclick="openInDrive()" id="openBtn">📂 Открыть в Google Диске</button>
                <button class="action-btn download" onclick="downloadFile()" id="downloadBtn">⬇ Скачать PDF</button>
            </div>
        </div>
    </div>

    <script>
        // !!! СЮДА ВСТАВЬТЕ ID ФАЙЛОВ ПОСЛЕ ТОГО, КАК СДЕЛАЕТЕ ИХ ПУБЛИЧНЫМИ !!!
        const files = {
            file1: {
                id: '19QOCPFsZgNtxRxESmtKgsi3gOKmPWNUv',  // Замените на правильный ID
                name: 'Физика - Работа №1',
                icon: '⚡'
            },
            file2: {
                id: '1p91Yi0Dh8_19QIuwfs6niz9qV1Vs7gNs',  // Замените на правильный ID
                name: 'Физика - Работа №2',
                icon: '🔋'
            },
            file3: {
                id: '18a_sA3qhksjKvZ1BlItlqdQjnAHF3K5J',  // Замените на правильный ID
                name: 'Физика - Работа №3',
                icon: '💡'
            }
        };
        
        let currentFile = 'file1'; // Какой файл сейчас загружен
        
        // Функция загрузки файла в просмотрщик
        function loadFile(fileKey) {
            currentFile = fileKey;
            const fileId = files[fileKey].id;
            const viewer = document.getElementById('pdfViewer');
            
            // Ссылка для встраивания
            viewer.src = `https://drive.google.com/file/d/${fileId}/preview`;
            
            // Обновляем активную карточку
            document.querySelectorAll('.file-card').forEach(card => {
                card.classList.remove('active');
            });
            document.getElementById(`card${fileKey.slice(-1)}`).classList.add('active');
        }
        
        // Функция открытия в Google Drive
        function openInDrive() {
            const fileId = files[currentFile].id;
            window.open(`https://drive.google.com/file/d/${fileId}/view`, '_blank');
        }
        
        // Функция скачивания
        function downloadFile() {
            const fileId = files[currentFile].id;
            window.open(`https://drive.google.com/uc?export=download&id=${fileId}`, '_blank');
        }
        
        // Загружаем первый файл при открытии страницы
        window.onload = function() {
            loadFile('file1');
        };
    </script>
</body>
</html>
