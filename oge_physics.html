<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физика ОГЭ | Материалы</title>
    <style>
        /* Копируем все стили из шаблона */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #764ba2;
            transform: translateX(-5px);
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            padding: 8px 20px;
            border-radius: 50px;
            color: #333;
            font-weight: 600;
        }
        
        .page-title span {
            background: #e74c3c;
            color: white;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.8em;
        }
        
        .content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            margin-top: 2px;
        }
        
        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid #e74c3c;
        }
        
        .pdf-container {
            width: 100%;
            height: 800px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .pdf-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        
        .pdf-btn {
            display: inline-block;
            padding: 15px 30px;
            background: white;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .pdf-btn:hover {
            background: #e74c3c;
            color: white;
            transform: translateY(-2px);
        }
        
        .pdf-btn.active {
            background: #e74c3c;
            color: white;
        }
        
        .pdf-list {
            list-style: none;
            padding: 0;
            margin-top: 30px;
        }
        
        .pdf-list li {
            margin-bottom: 10px;
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .pdf-list li:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .pdf-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .pdf-icon {
            font-size: 1.5em;
            color: #e74c3c;
        }
        
        .pdf-name {
            font-weight: 600;
            color: #333;
        }
        
        .pdf-size {
            color: #666;
            font-size: 0.9em;
        }
        
        .open-pdf {
            display: inline-block;
            padding: 8px 20px;
            background: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .open-pdf:hover {
            background: #219a52;
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .pdf-container {
                height: 500px;
            }
            
            .pdf-list li {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            
            .pdf-info {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-left">
                <a href="oge.html" class="back-btn">← Назад к ОГЭ</a>
            </div>
            <div class="nav-right">
                <div class="page-title">
                    Физика ⚡ <span>ОГЭ</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="section-title">📚 Физика - материалы для подготовки к ОГЭ</div>
            
            <!-- Встроенный PDF просмотрщик -->
            <div class="pdf-container">
                <iframe class="pdf-viewer" id="pdfViewer" src=""></iframe>
            </div>
            
            <!-- Кнопки для переключения PDF -->
            <div class="pdf-controls">
                <button class="pdf-btn active" onclick="loadPDF('file1')">📄 Механика</button>
                <button class="pdf-btn" onclick="loadPDF('file2')">📄 Термодинамика</button>
                <button class="pdf-btn" onclick="loadPDF('file3')">📄 Электричество</button>
                <button class="pdf-btn" onclick="loadPDF('file4')">📄 Оптика</button>
            </div>
            
            <!-- Список всех PDF файлов -->
            <ul class="pdf-list">
                <li>
                    <div class="pdf-info">
                        <span class="pdf-icon">📕</span>
                        <span class="pdf-name">Механика: законы Ньютона</span>
                        <span class="pdf-size">PDF, 2.5 МБ</span>
                    </div>
                    <a href="#" class="open-pdf" onclick="loadPDF('file1'); return false;">Открыть</a>
                </li>
                <li>
                    <div class="pdf-info">
                        <span class="pdf-icon">📗</span>
                        <span class="pdf-name">Термодинамика: тепловые явления</span>
                        <span class="pdf-size">PDF, 3.1 МБ</span>
                    </div>
                    <a href="#" class="open-pdf" onclick="loadPDF('file2'); return false;">Открыть</a>
                </li>
                <li>
                    <div class="pdf-info">
                        <span class="pdf-icon">📘</span>
                        <span class="pdf-name">Электричество: цепи и законы</span>
                        <span class="pdf-size">PDF, 2.8 МБ</span>
                    </div>
                    <a href="#" class="open-pdf" onclick="loadPDF('file3'); return false;">Открыть</a>
                </li>
                <li>
                    <div class="pdf-info">
                        <span class="pdf-icon">📙</span>
                        <span class="pdf-name">Оптика: линзы и зеркала</span>
                        <span class="pdf-size">PDF, 2.3 МБ</span>
                    </div>
                    <a href="#" class="open-pdf" onclick="loadPDF('file4'); return false;">Открыть</a>
                </li>
            </ul>
        </div>
    </div>

    <script>
        // ЗДЕСЬ ВСТАВЬТЕ ССЫЛКИ НА ВАШИ ФАЙЛЫ ИЗ GOOGLE CLOUD
        const pdfFiles = {
            file1: 'https://storage.googleapis.com/your-bucket-name/oge_physics_mechanics.pdf',
            file2: 'https://storage.googleapis.com/your-bucket-name/oge_physics_thermodynamics.pdf',
            file3: 'https://storage.googleapis.com/your-bucket-name/oge_physics_electricity.pdf',
            file4: 'https://storage.googleapis.com/your-bucket-name/oge_physics_optics.pdf'
        };
        
        function loadPDF(fileKey) {
            const viewer = document.getElementById('pdfViewer');
            viewer.src = pdfFiles[fileKey];
            
            // Подсветка активной кнопки
            document.querySelectorAll('.pdf-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Прокрутка к просмотрщику
            viewer.scrollIntoView({ behavior: 'smooth' });
        }
        
        // Загружаем первый PDF при открытии страницы
        window.onload = function() {
            loadPDF('file1');
        };
    </script>
</body>
</html>
