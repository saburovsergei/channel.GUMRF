<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Презентация ФОЭ | ГУМРФ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #764ba2;
            transform: translateX(-5px);
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            padding: 8px 20px;
            border-radius: 50px;
            color: #333;
            font-weight: 600;
        }
        
        .page-title span {
            background: #9b59b6;
            color: white;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.8em;
        }
        
        .content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            margin-top: 2px;
            min-height: 500px;
        }
        
        .presentation-container {
            width: 100%;
            height: 70vh;
            min-height: 500px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
            background: #f8f9fa;
        }
        
        .presentation-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .action-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            background: #9b59b6;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .action-button:hover {
            background: #764ba2;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(155, 89, 182, 0.3);
        }
        
        .action-button.secondary {
            background: #3498db;
        }
        
        .action-button.secondary:hover {
            background: #2980b9;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 1.1em;
        }
        
        .error {
            text-align: center;
            padding: 30px;
            color: #e74c3c;
            font-size: 1.1em;
        }
        
        .info-box {
            background: #f0f7ff;
            border-left: 4px solid #9b59b6;
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 10px;
            color: #333;
            line-height: 1.5;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .info-icon {
            font-size: 1.8em;
        }
        
        .info-text {
            flex: 1;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .nav-left, .nav-right {
                width: 100%;
                justify-content: center;
            }
            
            .content {
                padding: 20px;
            }
            
            .presentation-container {
                height: 50vh;
                min-height: 350px;
            }
            
            .button-container {
                flex-direction: column;
            }
            
            .action-button {
                width: 100%;
                justify-content: center;
            }
            
            .info-box {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-left">
                <a href="gumrf_foe.html" class="back-btn">← Назад</a>
            </div>
            <div class="nav-right">
                <div class="page-title">
                    📽️ Презентация ФОЭ <span>ГУМРФ</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div id="presentation-container" class="presentation-container">
                <div class="loading">Загрузка презентации...</div>
            </div>
            
            <div class="button-container" id="button-container" style="display: none;">
                <!-- Кнопки появятся после загрузки ID -->
            </div>
            
            <div id="info-box" class="info-box" style="display: none;">
                <span class="info-icon">ℹ️</span>
                <span class="info-text">В полноэкранном режиме используйте стрелки клавиатуры или кликайте мышью по краям экрана для переключения слайдов.</span>
            </div>
        </div>
    </div>

    <script>
        async function loadPresentationId() {
            try {
                const response = await fetch('gumrf_foe_presentation.txt?t=' + Date.now());
                
                if (!response.ok) {
                    throw new Error('Не удалось загрузить файл с ID презентации');
                }
                
                const text = await response.text();
                
                // Ищем первую непустую строку, не начинающуюся с #
                const lines = text.split('\n');
                let presentationId = null;
                
                for (let line of lines) {
                    line = line.trim();
                    if (line && !line.startsWith('#')) {
                        presentationId = line;
                        break;
                    }
                }
                
                if (!presentationId) {
                    throw new Error('ID презентации не найден в файле');
                }
                
                console.log('Загружен ID презентации:', presentationId);
                
                // Отображаем презентацию
                const container = document.getElementById('presentation-container');
                container.innerHTML = `
                    <iframe 
                        class="presentation-frame" 
                        src="https://docs.google.com/presentation/d/e/${presentationId}/embed?start=false&loop=false&delayms=3000" 
                        allowfullscreen="true" 
                        mozallowfullscreen="true" 
                        webkitallowfullscreen="true">
                    </iframe>
                `;
                
                // Показываем кнопки и информацию
                document.getElementById('button-container').style.display = 'flex';
                document.getElementById('info-box').style.display = 'flex';
                
                // Добавляем кнопки
                const buttonContainer = document.getElementById('button-container');
                buttonContainer.innerHTML = `
                    <a href="https://docs.google.com/presentation/d/e/${presentationId}/pub?start=false&loop=false&delayms=3000" 
                       class="action-button" 
                       target="_blank">
                        🖥️ Открыть в полноэкранном режиме
                    </a>
                    <a href="https://docs.google.com/presentation/d/${presentationId}/edit" 
                       class="action-button secondary" 
                       target="_blank">
                        ✏️ Редактировать презентацию
                    </a>
                `;
                
            } catch (error) {
                console.error('Ошибка:', error);
                const container = document.getElementById('presentation-container');
                container.innerHTML = `<div class="error">❌ Ошибка загрузки презентации<br>${error.message}</div>`;
            }
        }
        
        // Загружаем презентацию при открытии страницы
        document.addEventListener('DOMContentLoaded', loadPresentationId);
    </script>
</body>
</html>
