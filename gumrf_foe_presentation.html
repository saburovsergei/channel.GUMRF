<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Презентация ФОЭ | ГУМРФ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #764ba2;
            transform: translateX(-5px);
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            padding: 8px 20px;
            border-radius: 50px;
            color: #333;
            font-weight: 600;
        }
        
        .page-title span {
            background: #9b59b6;
            color: white;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.8em;
        }
        
        .content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            margin-top: 2px;
            min-height: 500px;
        }
        
        .presentation-container {
            width: 100%;
            height: 70vh;
            min-height: 500px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
            background: #f8f9fa;
        }
        
        .presentation-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 1.1em;
        }
        
        .error {
            text-align: center;
            padding: 30px;
            color: #e74c3c;
            font-size: 1.1em;
        }
        
        .info-text {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #666;
            font-size: 0.95em;
            border: 1px solid #e0e0e0;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .nav-left, .nav-right {
                width: 100%;
                justify-content: center;
            }
            
            .content {
                padding: 20px;
            }
            
            .presentation-container {
                height: 50vh;
                min-height: 350px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-left">
                <a href="gumrf_foe.html" class="back-btn">← Назад</a>
            </div>
            <div class="nav-right">
                <div class="page-title">
                    📽️ Презентация ФОЭ <span>ГУМРФ</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div id="presentation-container" class="presentation-container">
                <div class="loading">Загрузка презентации...</div>
            </div>
            
            <div class="info-text">
                🔧 Если презентация не загружается, убедитесь что файл открыт в общем доступе
            </div>
        </div>
    </div>

    <script>
        // ID презентации из Google Drive (нужно заменить на реальный ID)
        const PRESENTATION_ID = '1Fx3nPDXBq5qbfjswwgdxLM799shx6fTn'; // Сюда вставьте ID вашей презентации
        #https://docs.google.com/presentation/d/1Fx3nPDXBq5qbfjswwgdxLM799shx6fTn/edit?usp=sharing&ouid=114898922089074890850&rtpof=true&sd=true
        // Функция для загрузки презентации
        async function loadPresentation() {
            const container = document.getElementById('presentation-container');
            
            if (!PRESENTATION_ID || PRESENTATION_ID === 'ВАШ_ID_ПРЕЗЕНТАЦИИ') {
                container.innerHTML = '<div class="error">❌ Не указан ID презентации. Пожалуйста, вставьте ID в код.</div>';
                return;
            }
            
            // Формируем URL для встраивания
            const embedUrl = `https://docs.google.com/presentation/d/e/${PRESENTATION_ID}/embed`;
            
            container.innerHTML = `
                <iframe 
                    class="presentation-frame" 
                    src="${embedUrl}" 
                    frameborder="0" 
                    allowfullscreen="true" 
                    mozallowfullscreen="true" 
                    webkitallowfullscreen="true">
                </iframe>
            `;
        }
        
        // Загружаем презентацию при открытии страницы
        document.addEventListener('DOMContentLoaded', loadPresentation);
    </script>
</body>
</html>
