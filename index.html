<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учебные материалы и подготовка к экзаменам</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .menu-container {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .menu-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .menu-header h1 {
            font-size: 2.8em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .menu-header p {
            font-size: 1.3em;
            opacity: 0.95;
            line-height: 1.5;
        }
        
        .menu-content {
            padding: 40px;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .menu-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1.8em;
            font-weight: 600;
            color: #333;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 180px;
            width: 100%;
            word-wrap: break-word;
            word-break: break-word;
            hyphens: auto;
        }
        
        .menu-btn:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .menu-btn:active {
            transform: translateY(0);
        }
        
        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        
        .menu-btn:hover::before {
            transform: translateX(0);
        }
        
        .btn-title {
            font-size: 1.5em;
            color: #333;
            font-weight: 600;
            margin-top: 15px;
            line-height: 1.3;
            max-width: 100%;
            padding: 0 5px;
        }
        
        .btn-icon {
            font-size: 3.2em;
            margin-bottom: 10px;
        }
        
        .btn-oge .btn-icon {
            color: #e74c3c;
        }
        
        .btn-ege .btn-icon {
            color: #3498db;
        }
        
        .btn-gumrf .btn-icon {
            color: #9b59b6;
        }
        
        .btn-prog .btn-icon {
            color: #f39c12;
        }
        
        /* Блок с контактами */
        .contact-section {
            text-align: center;
            margin: 20px 0 20px 0;
            padding: 20px;
        }
        
        .contact-link {
            display: inline-block;
            padding: 15px 40px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.2em;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .contact-link:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            border-top: 2px solid #e0e0e0;
            margin-top: 20px;
        }
        
        /* Адаптация */
        @media (max-width: 900px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 600px) {
            .menu-header {
                padding: 30px 20px;
            }
            
            .menu-header h1 {
                font-size: 2em;
            }
            
            .menu-header p {
                font-size: 1.1em;
            }
            
            .menu-content {
                padding: 20px;
            }
            
            .menu-grid {
                grid-template-columns: 1fr;
            }
            
            .menu-btn {
                padding: 25px 15px;
                min-height: 140px;
                flex-direction: row;
                justify-content: flex-start;
                gap: 20px;
            }
            
            .btn-icon {
                font-size: 2.5em;
                margin-bottom: 0;
                min-width: 50px;
            }
            
            .btn-title {
                font-size: 1.3em;
                margin-top: 0;
                text-align: left;
                flex: 1;
            }
            
            .contact-link {
                padding: 12px 30px;
                font-size: 1.1em;
                width: 100%;
                max-width: 300px;
            }
        }
        
        @media (max-width: 380px) {
            .btn-title {
                font-size: 1.1em;
            }
            
            .btn-icon {
                font-size: 2em;
                min-width: 40px;
            }
            
            .menu-btn {
                padding: 20px 10px;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <div class="menu-header">
            <h1>📚 Учебные материалы</h1>
            <p>Подготовка к экзаменам</p>
        </div>
        
        <div class="menu-content">
            <!-- Основное меню -->
            <div class="menu-grid">
                <!-- Кнопка ОГЭ -->
                <a href="oge.html" class="menu-btn btn-oge">
                    <span class="btn-icon">📘</span>
                    <span class="btn-title">ОГЭ</span>
                </a>
                
                <!-- Кнопка ЕГЭ -->
                <a href="ege.html" class="menu-btn btn-ege">
                    <span class="btn-icon">📗</span>
                    <span class="btn-title">ЕГЭ</span>
                </a>
                
                <!-- Кнопка ГУМРФ -->
                <a href="gumrf.html" class="menu-btn btn-gumrf">
                    <span class="btn-icon">⚓</span>
                    <span class="btn-title">ГУМРФ</span>
                </a>
                
                <!-- Кнопка Программирование -->
                <a href="programming.html" class="menu-btn btn-prog">
                    <span class="btn-icon">💻</span>
                    <span class="btn-title">Программирование</span>
                </a>
            </div>
            
            <!-- Только ссылка на контакты -->
            <div class="contact-section">
                <a href="#" class="contact-link">📞 Контакты и обсуждение</a>
            </div>
            
            <!-- Футер -->
            <div class="footer">
                <p>© 2024 | Материалы для образовательных целей</p>
            </div>
        </div>
    </div>
</body>
</html>
