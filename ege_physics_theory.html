<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Физика ЕГЭ | Теория</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #764ba2;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            padding: 6px 16px;
            border-radius: 50px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        .page-title span {
            background: #3498db; /* Синий для ЕГЭ */
            color: white;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.8em;
        }
        
        .refresh-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .refresh-btn:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        
        .content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 20px 15px;
            margin-top: 2px;
        }
        
        .theory-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 100%;
            margin: 0 auto;
        }
        
        .theory-item {
            background: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }
        
        .theory-header {
            padding: 12px 15px;
            background: white;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .theory-header:hover {
            background: #e8f0fe; /* Светло-синий при наведении */
        }
        
        .expand-icon {
            font-size: 1.2em;
            color: #3498db; /* Синие треугольники */
            transition: transform 0.3s ease;
            min-width: 20px;
            text-align: center;
        }
        
        .theory-name {
            flex: 1;
            font-size: 1.1em;
            font-weight: 500;
            color: #333;
        }
        
        .theory-header.active .expand-icon {
            transform: rotate(90deg);
        }
        
        .pdf-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            background: #f8f9fa;
        }
        
        .pdf-container.open {
            max-height: 85vh;
            border-top: 1px solid #e0e0e0;
        }
        
        .pdf-wrapper {
            width: 100%;
            height: 85vh;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            background: #f0f0f0;
        }
        
        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            -webkit-perspective: 1000;
            perspective: 1000;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 1.1em;
        }
        
        .error {
            text-align: center;
            padding: 30px;
            color: #e74c3c;
            font-size: 1.1em;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .nav-right {
                width: 100%;
                justify-content: space-between;
            }
            
            .refresh-btn {
                padding: 6px 12px;
                font-size: 0.85em;
            }
            
            .pdf-container.open {
                max-height: 80vh;
            }
            
            .pdf-wrapper {
                height: 80vh;
            }
        }
        
        @media (max-width: 380px) {
            .theory-name {
                font-size: 1em;
            }
            
            .theory-header {
                padding: 10px 12px;
            }
            
            .refresh-btn {
                padding: 5px 10px;
                font-size: 0.8em;
            }
            
            .expand-icon {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-left">
                <a href="ege_physics.html" class="back-btn">← Назад</a>
            </div>
            <div class="nav-right">
                <div class="page-title">
                    Физика ⚡ <span>теория</span>
                </div>
                <button class="refresh-btn" onclick="forceReloadThemes()">
                    <span>🔄</span> Обновить
                </button>
            </div>
        </div>
        
        <div class="content">
            <div id="theory-list-container" class="theory-list">
                <div class="loading">Загрузка тем...</div>
            </div>
        </div>
    </div>

    <script>
        let currentOpenContainer = null;
        let currentActiveHeader = null;
        let currentTopicKey = null;
        let currentCacheBuster = Date.now();
        
        async function loadThemes() {
            try {
                const url = `ege_physics_theory_themes.txt?t=${currentCacheBuster}`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Не удалось загрузить файл с темами');
                }
                
                const text = await response.text();
                console.log('Загруженные данные:', text);
                
                const lines = text.trim().split('\n');
                
                const theoryFiles = {};
                const container = document.getElementById('theory-list-container');
                container.innerHTML = '';
                
                let hasValidLines = false;
                
                lines.forEach((line, index) => {
                    if (!line.trim()) return;
                    
                    const [name, id] = line.split('|');
                    if (name && id) {
                        hasValidLines = true;
                        const topicKey = `topic${index + 1}`;
                        theoryFiles[topicKey] = { 
                            id: id.trim(), 
                            name: name.trim() 
                        };
                        
                        const topicElement = createTopicElement(topicKey, name.trim());
                        container.appendChild(topicElement);
                        
                        console.log(`Добавлена тема: ${name.trim()} с ID: ${id.trim()}`);
                    }
                });
                
                window.theoryFiles = theoryFiles;
                
                if (!hasValidLines) {
                    container.innerHTML = '<div class="error">Файл с темами пуст или имеет неверный формат</div>';
                }
                
            } catch (error) {
                console.error('Ошибка загрузки тем:', error);
                const container = document.getElementById('theory-list-container');
                container.innerHTML = `<div class="error">Ошибка загрузки тем. Проверьте файл ege_physics_theory_themes.txt<br>${error.message}</div>`;
            }
        }
        
        function forceReloadThemes() {
            currentCacheBuster = Date.now();
            loadThemes();
            
            const btn = event.currentTarget;
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
            }, 200);
        }
        
        function createTopicElement(topicKey, topicName) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'theory-item';
            
            const headerDiv = document.createElement('div');
            headerDiv.className = 'theory-header';
            headerDiv.setAttribute('onclick', `toggleTheory('${topicKey}', this)`);
            
            headerDiv.innerHTML = `
                <div class="expand-icon">▶</div>
                <div class="theory-name">${topicName}</div>
            `;
            
            // ЕДИНСТВЕННЫЙ контейнер для PDF на каждую тему
            const pdfContainer = document.createElement('div');
            pdfContainer.className = 'pdf-container';
            pdfContainer.id = `pdf-${topicKey}`;
            
            const pdfWrapper = document.createElement('div');
            pdfWrapper.className = 'pdf-wrapper';
            
            const pdfViewer = document.createElement('iframe');
            pdfViewer.className = 'pdf-viewer';
            pdfViewer.id = `viewer-${topicKey}`;
            pdfViewer.src = '';
            pdfViewer.setAttribute('seamless', 'seamless');
            pdfViewer.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation');
            
            pdfWrapper.appendChild(pdfViewer);
            pdfContainer.appendChild(pdfWrapper);
            itemDiv.appendChild(headerDiv);
            itemDiv.appendChild(pdfContainer);
            
            return itemDiv;
        }
        
        function toggleTheory(topicKey, header) {
            const fileData = window.theoryFiles[topicKey];
            
            if (!fileData) {
                alert(`Данные для темы не найдены`);
                return;
            }
            
            if (!fileData.id || fileData.id.startsWith('ID_')) {
                alert(`Файл для "${fileData.name}" еще не добавлен. Пожалуйста, укажите ID в файле ege_physics_theory_themes.txt`);
                return;
            }
            
            const container = document.getElementById(`pdf-${topicKey}`);
            const viewer = document.getElementById(`viewer-${topicKey}`);
            
            // Если кликнули на ту же тему (закрываем)
            if (currentActiveHeader === header && currentTopicKey === topicKey) {
                container.classList.remove('open');
                header.classList.remove('active');
                currentActiveHeader = null;
                currentOpenContainer = null;
                currentTopicKey = null;
                return;
            }
            
            // Если открыта другая тема - закрываем её
            if (currentOpenContainer && currentTopicKey !== topicKey) {
                currentOpenContainer.classList.remove('open');
                if (currentActiveHeader) {
                    currentActiveHeader.classList.remove('active');
                }
            }
            
            // Загружаем PDF
            viewer.src = `https://drive.google.com/file/d/${fileData.id}/preview?rm=minimal&embedded=true`;
            
            // Открываем текущую тему
            container.classList.add('open');
            header.classList.add('active');
            
            currentOpenContainer = container;
            currentActiveHeader = header;
            currentTopicKey = topicKey;
            
            // Плавно прокручиваем
            setTimeout(() => {
                container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }
        
        document.addEventListener('DOMContentLoaded', loadThemes);
        
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                forceReloadThemes();
            }
        });
    </script>
</body>
</html>
