<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>C# | Теория</title>
</head>
<body>
    <script>
        fetch('programming_content_template.html')
            .then(response => response.text())
            .then(html => {
                document.open();
                document.write(html);
                document.close();
            })
            .catch(error => {
                console.error('Ошибка загрузки шаблона:', error);
                document.body.innerHTML = '<div style="color: red; padding: 20px;">Ошибка загрузки шаблона</div>';
            });
    </script>
</body>
</html>
