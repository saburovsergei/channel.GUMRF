<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информатика ОГЭ | Практика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .nav-left {
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #764ba2;
            transform: translateX(-5px);
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            padding: 8px 20px;
            border-radius: 50px;
            color: #333;
            font-weight: 600;
        }
        
        .page-title span {
            background: #f39c12;
            color: white;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.8em;
        }
        
        .content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            margin-top: 2px;
        }
        
        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 3px solid #f39c12;
        }
        
        .pdf-container {
            width: 100%;
            height: 800px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 40px;
        }
        
        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .examples-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .example-pair {
            display: flex;
            gap: 20px;
            align-items: center;
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 15px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .example-pair:hover {
            border-color: #f39c12;
            background: #fef5e7;
            transform: translateX(10px);
        }
        
        .example-name {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            min-width: 120px;
        }
        
        .example-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .example-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 25px;
            background: white;
            border: 2px solid #f39c12;
            border-radius: 50px;
            color: #f39c12;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .example-link.solution {
            border-color: #27ae60;
            color: #27ae60;
        }
        
        .example-link:hover {
            background: #f39c12;
            color: white;
            transform: translateY(-2px);
        }
        
        .example-link.solution:hover {
            background: #27ae60;
            color: white;
        }
        
        .example-link.active {
            background: #f39c12;
            color: white;
        }
        
        .example-link.solution.active {
            background: #27ae60;
            color: white;
        }
        
        .link-icon {
            font-size: 1.2em;
        }
        
        @media (max-width: 768px) {
            .pdf-container {
                height: 500px;
            }
            
            .example-pair {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .example-links {
                width: 100%;
                justify-content: space-between;
            }
            
            .example-link {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-left">
                <a href="oge_informatics.html" class="back-btn">← Назад к разделам</a>
            </div>
            <div class="nav-right">
                <div class="page-title">
                    Информатика ⌨️ <span>практика</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="section-title">📚 Тренировочные задания по информатике</div>
            
            <!-- Контейнер для предпросмотра PDF -->
            <div class="pdf-container">
                <iframe class="pdf-viewer" id="pdfViewer" src=""></iframe>
            </div>
            
            <!-- Список заданий с парными ссылками -->
            <div class="examples-list">
                <!-- Задание 1: Кодирование информации -->
                <div class="example-pair">
                    <div class="example-name">Кодирование</div>
                    <div class="example-links">
                        <a href="#" class="example-link" onclick="loadPDF('task1'); return false;">
                            <span class="link-icon">📋</span> Задание
                        </a>
                        <a href="#" class="example-link solution" onclick="loadPDF('solution1'); return false;">
                            <span class="link-icon">✅</span> Решение
                        </a>
                    </div>
                </div>
                
                <!-- Задание 2: Алгоритмы -->
                <div class="example-pair">
                    <div class="example-name">Алгоритмы</div>
                    <div class="example-links">
                        <a href="#" class="example-link" onclick="loadPDF('task2'); return false;">
                            <span class="link-icon">📋</span> Задание
                        </a>
                        <a href="#" class="example-link solution" onclick="loadPDF('solution2'); return false;">
                            <span class="link-icon">✅</span> Решение
                        </a>
                    </div>
                </div>
                
                <!-- Задание 3: Программирование на Python -->
                <div class="example-pair">
                    <div class="example-name">Python</div>
                    <div class="example-links">
                        <a href="#" class="example-link" onclick="loadPDF('task3'); return false;">
                            <span class="link-icon">📋</span> Задание
                        </a>
                        <a href="#" class="example-link solution" onclick="loadPDF('solution3'); return false;">
                            <span class="link-icon">✅</span> Решение
                        </a>
                    </div>
                </div>
                
                <!-- Задание 4: Логика -->
                <div class="example-pair">
                    <div class="example-name">Логика</div>
                    <div class="example-links">
                        <a href="#" class="example-link" onclick="loadPDF('task4'); return false;">
                            <span class="link-icon">📋</span> Задание
                        </a>
                        <a href="#" class="example-link solution" onclick="loadPDF('solution4'); return false;">
                            <span class="link-icon">✅</span> Решение
                        </a>
                    </div>
                </div>
                
                <!-- Задание 5: Файловая система -->
                <div class="example-pair">
                    <div class="example-name">Файловая система</div>
                    <div class="example-links">
                        <a href="#" class="example-link" onclick="loadPDF('task5'); return false;">
                            <span class="link-icon">📋</span> Задание
                        </a>
                        <a href="#" class="example-link solution" onclick="loadPDF('solution5'); return false;">
                            <span class="link-icon">✅</span> Решение
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // !!! ЗДЕСЬ ВСТАВЬТЕ ID ВАШИХ ФАЙЛОВ С GOOGLE DRIVE !!!
        const files = {
            // Задания (условия)
            task1: { id: 'ID_ЗАДАНИЯ_КОДИРОВАНИЕ', name: 'Задание: Кодирование' },
            task2: { id: 'ID_ЗАДАНИЯ_АЛГОРИТМЫ', name: 'Задание: Алгоритмы' },
            task3: { id: 'ID_ЗАДАНИЯ_PYTHON', name: 'Задание: Python' },
            task4: { id: 'ID_ЗАДАНИЯ_ЛОГИКА', name: 'Задание: Логика' },
            task5: { id: 'ID_ЗАДАНИЯ_ФАЙЛЫ', name: 'Задание: Файловая система' },
            
            // Решения
            solution1: { id: 'ID_РЕШЕНИЯ_КОДИРОВАНИЕ', name: 'Решение: Кодирование' },
            solution2: { id: 'ID_РЕШЕНИЯ_АЛГОРИТМЫ', name: 'Решение: Алгоритмы' },
            solution3: { id: 'ID_РЕШЕНИЯ_PYTHON', name: 'Решение: Python' },
            solution4: { id: 'ID_РЕШЕНИЯ_ЛОГИКА', name: 'Решение: Логика' },
            solution5: { id: 'ID_РЕШЕНИЯ_ФАЙЛЫ', name: 'Решение: Файловая система' }
        };
        
        function loadPDF(fileKey) {
            const fileId = files[fileKey].id;
            const viewer = document.getElementById('pdfViewer');
            
            // Проверяем, что ID не пустой и не шаблонный
            if (fileId && !fileId.startsWith('ID_')) {
                viewer.src = `https://drive.google.com/file/d/${fileId}/preview`;
            } else {
                alert(`Файл "${files[fileKey].name}" еще не добавлен. Пожалуйста, вставьте ID файла в код.`);
                return;
            }
            
            // Подсвечиваем активную ссылку
            document.querySelectorAll('.example-link').forEach(link => {
                link.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        // Загружаем первое задание при открытии страницы
        window.onload = function() {
            // Проверяем, есть ли реальный ID для первого задания
            if (files.task1.id !== 'ID_ЗАДАНИЯ_КОДИРОВАНИЕ') {
                loadPDF('task1');
            }
        };
    </script>
</body>
</html>
